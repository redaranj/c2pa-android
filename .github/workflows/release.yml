name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the release (e.g. 1.0.0)'
        required: true
        type: string
      publish:
        description: 'Publish release immediately (false = draft for review)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Validate version format
      run: |
        # Simple validation for version format
        if [[ ! "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Version must be in format X.Y.Z (e.g., 1.0.0)"
          exit 1
        fi
    
    - name: Configure Git user
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Create tag
      run: |
        git tag ${{ github.event.inputs.version }}
        git push origin ${{ github.event.inputs.version }}

    - name: Display release information
      run: |
        echo "Starting release process for version ${{ github.event.inputs.version }}"
        echo "This workflow will:"
        echo "1. Download pre-built Android libraries"
        echo "2. Build the Android AAR"
        echo "3. Generate SBOM and build attestations"
        echo "4. Create a GitHub release with artifacts"
        if [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
          echo "5. Publish release immediately"
        else
          echo "5. Create as DRAFT for review before publishing"
        fi

    - name: Set up JDK 17
      id: setup-java
      uses: actions/setup-java@v3
      with:
        java-version: "17"
        distribution: "temurin"

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set environment variables
      run: |
        echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

    - name: Build Android AAR
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.path }}
      run: |
        make library

    - name: List AAR artifacts
      run: |
        echo "Built AAR files:"
        find library/build/outputs/aar -name "*.aar" -type f

    - name: Generate SBOM
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.path }}
      run: |
        ./gradlew :library:cyclonedxDirectBom

    - name: Attest build provenance
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: 'library/build/outputs/aar/*.aar'

    - name: Attest SBOM
      uses: actions/attest-sbom@v2
      with:
        subject-path: 'library/build/outputs/aar/*.aar'
        sbom-path: 'library/build/reports/sbom.json'

    - name: Publish to GitHub Packages
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI_COMMIT_TAG: ${{ github.event.inputs.version }}
      run: |
        make publish

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: C2PA Android ${{ github.event.inputs.version }}
        draft: ${{ github.event.inputs.publish != 'true' }}
        files: |
          library/build/outputs/aar/*.aar
        body: |
          # C2PA Android Release ${{ github.event.inputs.version }}

          ## Android Integration

          ### Gradle dependency

          Add the AAR library to your Android project:

          1. Download the AAR file from this release
          2. Place it in your app's `libs` directory
          3. Add to your `build.gradle`:

          ```gradle
          dependencies {
              implementation files('libs/c2pa-release.aar')
          }
          ```

          ### Usage

          See the [README.md](https://github.com/${{ github.repository }}) for detailed integration instructions and API documentation.

          ## What's Changed

          See the [commit history](https://github.com/${{ github.repository }}/compare/{{ previousTag }}...${{ github.event.inputs.version }}) for a full list of changes.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Release summary
      run: |
        echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: ${{ github.event.inputs.publish == 'true' && 'Published' || 'Draft (requires manual publish)' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Attestations" >> $GITHUB_STEP_SUMMARY
        echo "- Build provenance: Created" >> $GITHUB_STEP_SUMMARY
        echo "- SBOM: Created" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Verify attestations" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "gh attestation verify <path-to-aar> --repo ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ github.event.inputs.publish }}" != "true" ]]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the [draft release](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify attestations are attached" >> $GITHUB_STEP_SUMMARY
          echo "3. Click **Publish release** when ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note**: Once published with immutable releases enabled, the release cannot be modified." >> $GITHUB_STEP_SUMMARY
        fi
